<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>Endless Chase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=8" />
</head>
<body>
  <div id="game-root">
    <div id="game-stage">
      <canvas id="c" width="144" height="256"></canvas>
    </div>
    <div id="rotate-hint" class="rotate-hint hidden">ROTATE PHONE</div>

    <div id="ui">
      <section id="panel-menu" class="panel">
        <h1 class="brand">Endless <span>Chase</span></h1>
        <p class="tag">SWIPE TO STEER · DOWN TO BRAKE · UP TO SPEED · TAKE TURNS</p>
        <button type="button" id="btn-play" class="btn primary">Start Engine</button>
        <button type="button" id="btn-upgrades-menu" class="btn">Garage</button>
      </section>

      <section id="panel-hud" class="panel hud hidden">
        <div class="hud-row">
          <span id="hud-distance">0 m</span>
          <span id="hud-coins">$0</span>
        </div>
        <div id="hud-heat" class="heat-bar" aria-label="Police heat">
          <div id="hud-heat-fill" class="heat-fill"></div>
        </div>
        <div id="hud-boost" class="boost hidden">BOOST</div>
        <div id="hud-light" class="light-hint hidden"></div>
        <div id="hud-turn" class="turn-cue hidden"></div>
        <div id="hud-lane-warn" class="lane-warn hidden">WRONG WAY</div>
        <div id="hud-speed" class="speedo" aria-label="Speed">0</div>
      </section>

      <section id="panel-gameover" class="panel hidden">
        <h2 id="go-title">Busted!</h2>
        <p id="go-score">0 m</p>
        <p id="go-coins">+$0</p>
        <button type="button" id="btn-retry" class="btn primary">Retry</button>
        <button type="button" id="btn-upgrades-go" class="btn">Garage</button>
        <button type="button" id="btn-menu" class="btn ghost">Menu</button>
      </section>

      <section id="panel-upgrades" class="panel hidden">
        <h2>Garage</h2>
        <p id="up-coins">CASH $0</p>
        <div class="upgrade-row">
          <span id="up-speed-label">SPEED</span>
          <button type="button" id="btn-up-speed" class="btn small">Buy</button>
        </div>
        <div class="upgrade-row">
          <span id="up-accel-label">ACCEL</span>
          <button type="button" id="btn-up-accel" class="btn small">Buy</button>
        </div>
        <div class="upgrade-row">
          <span id="up-handling-label">HANDL</span>
          <button type="button" id="btn-up-handling" class="btn small">Buy</button>
        </div>
        <button type="button" id="btn-up-back" class="btn ghost">Back</button>
      </section>
    </div>
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
    }
  }
  </script>
  <script type="module" src="game.js?v=8"></script>
</body>
</html>
