<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <title>Endless Chase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=20" />
</head>
<body>
  <div id="game-root">
    <div id="game-stage">
      <canvas id="c" width="144" height="256"></canvas>
    </div>

    <div id="ui">
      <section id="panel-menu" class="panel">
        <h1 class="brand">Endless <span>Chase</span></h1>
        <p class="tag">SWIPE TO STEER · TAP STATIONS TO REFUEL · TAKE TURNS</p>
        <button type="button" id="btn-play" class="btn primary">Start Engine</button>
        <button type="button" id="btn-upgrades-menu" class="btn">Garage</button>
      </section>

      <section id="panel-hud" class="panel hud hidden">
        <div class="hud-row">
          <span id="hud-distance">0 m</span>
          <span id="hud-coins">$0</span>
        </div>

        <div id="hud-heat" class="police-bar" aria-label="Police proximity">
          <div class="police-siren police-siren-l" aria-hidden="true"></div>
          <div class="police-track">
            <div id="hud-heat-fill" class="police-fill"></div>
          </div>
          <div class="police-siren police-siren-r" aria-hidden="true"></div>
        </div>

        <div id="hud-boost" class="boost hidden">BOOST</div>
        <div id="hud-light" class="light-hint hidden"></div>
        <div id="hud-turn" class="turn-cue hidden"></div>
        <div id="hud-lane-warn" class="lane-warn hidden">WRONG WAY</div>
        <div id="hud-gas-hint" class="gas-hint hidden">Move closer to enter</div>

        <div id="hud-cluster" class="gauge-cluster" aria-label="Gauges">
          <div id="hud-gas-block" class="gas-gauge ok" aria-label="Fuel">
            <div class="fuel-icon" aria-hidden="true">
              <span class="fuel-nozzle"></span>
              <span class="fuel-body"></span>
              <span class="fuel-base"></span>
            </div>
            <div id="hud-gas" class="gas-bar">
              <div id="hud-gas-fill" class="gas-fill"></div>
            </div>
          </div>
          <div id="hud-speed" class="speedo" aria-label="Speed">0</div>
        </div>

        <button type="button" id="hud-station-float" class="station-float hidden">TAP TO FILL UP!</button>
        <button type="button" id="hud-merge-btn" class="merge-btn hidden">MERGE WHEN CLEAR</button>
      </section>

      <section id="panel-pump" class="panel pump-panel hidden" aria-modal="true" role="dialog" aria-labelledby="pump-title">
        <div class="pump-shell">
          <h2 id="pump-title" class="pump-title">GAS PUMP</h2>
          <p id="pump-current" class="pump-current">FUEL 50%</p>
          <div class="pump-preview-bar" aria-hidden="true">
            <div id="pump-bar-now" class="pump-bar-now"></div>
          </div>
          <div class="pump-heat-row">
            <span class="pump-heat-label">COPS</span>
            <div class="pump-heat-bar"><div id="pump-heat-fill" class="pump-heat-fill"></div></div>
          </div>
          <button type="button" id="btn-pump-hold" class="btn pump-hold primary">HOLD TO FILL</button>
          <p id="pump-preview" class="pump-preview">RELEASE TO STOP · HOLD TOO LONG = BUSTED</p>
        </div>
      </section>

      <section id="panel-gameover" class="panel hidden">
        <h2 id="go-title">Busted!</h2>
        <p id="go-score">0 m</p>
        <p id="go-coins">+$0</p>
        <button type="button" id="btn-retry" class="btn primary">Retry</button>
        <button type="button" id="btn-upgrades-go" class="btn">Garage</button>
        <button type="button" id="btn-menu" class="btn ghost">Menu</button>
      </section>

      <section id="panel-upgrades" class="panel hidden">
        <h2>Garage</h2>
        <p id="up-coins">CASH $0</p>
        <p id="up-car-name" class="garage-car-name">Mobil</p>
        <div id="car-list" class="car-list" role="list"></div>
        <div class="garage-actions">
          <button type="button" id="btn-car-action" class="btn small">Select</button>
        </div>
        <div class="upgrade-row">
          <span id="up-speed-label">SPEED</span>
          <button type="button" id="btn-up-speed" class="btn small">Buy</button>
        </div>
        <div class="upgrade-row">
          <span id="up-accel-label">ACCEL</span>
          <button type="button" id="btn-up-accel" class="btn small">Buy</button>
        </div>
        <div class="upgrade-row">
          <span id="up-handling-label">HANDL</span>
          <button type="button" id="btn-up-handling" class="btn small">Buy</button>
        </div>
        <button type="button" id="btn-up-back" class="btn ghost">Back</button>
      </section>
    </div>
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="game.js?v=31"></script>
</body>
</html>
