<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <title>Endless Chase</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none; background: #1a1d27; touch-action: none; }
    #unity-container { width: 100%; height: 100%; position: absolute; left: 0; top: 0; }
    #unity-canvas { width: 100%; height: 100%; display: block; touch-action: none; outline: none; }
    #unity-loading-bar { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: none; }
    #unity-progress-bar-empty { width: 140px; height: 18px; margin-top: 10px; background: #3a3f55; }
    #unity-progress-bar-full { width: 0%; height: 100%; background: #FFB703; }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
    </div>
  </div>
  <script>
    // Suppress pull-to-refresh / page scroll on mobile browsers
    (function () {
      var canvas = document.querySelector("#unity-canvas");
      document.body.style.overscrollBehavior = "none";
      document.documentElement.style.overscrollBehavior = "none";
      var block = function (e) { if (e.cancelable) e.preventDefault(); };
      canvas.addEventListener("touchmove", block, { passive: false });
      canvas.addEventListener("gesturestart", block, { passive: false });
      document.addEventListener("touchmove", function (e) {
        if (e.target === canvas || canvas.contains(e.target)) {
          if (e.cancelable) e.preventDefault();
        }
      }, { passive: false });
    })();
  </script>
  <script src="Build/{{{ LOADER_FILENAME }}}"></script>
  <script>
    var buildUrl = "Build";
    createUnityInstance(document.querySelector("#unity-canvas"), {
      dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
      frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
      codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "EndlessChase",
      productName: "Endless Chase",
      productVersion: "0.1.0",
    });
  </script>
</body>
</html>
